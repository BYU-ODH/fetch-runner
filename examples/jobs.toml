# Sample fetch-runner config.
#
# [general].user — the user fetch-runner itself runs as. Must match the
#   running uid or fetch-runner refuses to start.
# [[jobs]].run_as (optional) — the user that owns this job's repo and
#   runs its git ops and script. Defaults to [general].user. When set,
#   sudo is used and a sudoers rule is required
#   (see `fetch-runner --print-sudoers <this-file>`).
# [[jobs]].branch (optional) — fixed branch to track. Omit to follow
#   whatever branch is currently checked out in the working tree, so an
#   operator can `git checkout` a different branch and fetch-runner will
#   start tracking it on the next poll. Detached HEAD is skipped.
# [[jobs]].args (optional) — extra argv passed to the script. Each entry
#   must be a single token (no whitespace or shell metacharacters); use
#   separate strings instead of one quoted blob. Args appear in the
#   generated sudoers rule, so regenerate after changing them.
#
# Convention: each repo lives at /srv/<run_as>/<repo_name>/.

[general]
user = "fetch-runner"
poll_interval_seconds = 60
[[jobs]]
name = "my example api"
path = "/srv/app1/api"
branch = "main"
script = "/srv/app1/api/deploy.sh"
run_as = "app1"
timeout_seconds = 600

[[jobs]]
name = "my example web"
path = "/srv/app2/web"
branch = "production"
script = "/srv/app2/web/deploy.sh"
args = ["--env=prod", "frontend"]
run_as = "app2"
