# Sample fetch-runner config.
#
# fetch-runner uses two distinct users:
#   * [general].user — the "polling user" the fetch-runner process runs as.
#     It owns nothing in the repos; it just runs the poll loop, validates
#     scripts, and dispatches work via sudo. fetch-runner refuses to start
#     if the running user does not match.
#   * [[jobs]].run_as (optional) — the user that *owns* the local git repository for
#     this job and the user `git fetch` / `git checkout` and the deploy
#     script all run as. Defaults to [general].user (which is
#     then both the polling user and the owner — the original single-user
#     mode). When it differs, fetch-runner dispatches every git call and
#     every script invocation via `sudo -u <run_as>` and a narrow sudoers
#     rule must allow it (see `fetch-runner --print-sudoers <this-file>`).

[general]
user = "fetch-runner"
poll_interval_seconds = 60

[[jobs]]
name = "my example api"
path = "/srv/api"
branch = "main"
script = "/srv/api/deploy.sh"
run_as = "app1"
timeout_seconds = 600

[[jobs]]
name = "my example web"
path = "/srv/web"
branch = "production"
script = "/srv/web/deploy.sh"
run_as = "app2"
